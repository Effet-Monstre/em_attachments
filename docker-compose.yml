services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: em_attachments_test
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d em_attachments_test"]
      interval: 3s
      timeout: 3s
      retries: 10
